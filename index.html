      darkMode: 'class',
      theme: {
        extend: {
          colors: {

              gray: '#F5F5F7',
              darkgray: '#86868B',

    @layer utilities {
      .backdrop-blur-xl {
        backdrop-filter: blur(24px);
      }

        text-shadow: 0 1px 2px rgba(0,0,0,0.1);
      }
      .glass-effect {
        background: rgba(255, 255, 255, 0.7);

        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
      }
      .dark .glass-effect {
        background: rgba(30, 30, 30, 0.7);
        border: 1px solid rgba(50, 50, 50, 0.5);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      }
      .liquid-animation {
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .hover-scale {
        transition: transform 0.3s ease-out;

      .hover-scale:hover {

      }

      }
      .toggle-checkbox:checked {
        right: 0;
        border-color: #68D391;
      }

        background-color: #68D391;
      }
    }
  </style>

<body class="bg-gradient-to-br from-apple-gray to-white min-h-screen font-sans text-apple-text overflow-x-hidden dark:from-gray-900 dark:to-gray-800 dark:text-gray-100 transition-colors duration-300">
  <div class="fixed -top-40 -left-40 w-96 h-96 rounded-full bg-blue-100 blur-3xl opacity-70 animate-blob dark:bg-blue-900 dark:opacity-30"></div>
  <div class="fixed top-1/3 -right-20 w-80 h-80 rounded-full bg-purple-100 blur-3xl opacity-60 animate-blob animation-delay-2000 dark:bg-purple-900 dark:opacity-30"></div>
  <div class="fixed bottom-20 left-1/4 w-72 h-72 rounded-full bg-pink-100 blur-3xl opacity-50 animate-blob animation-delay-4000 dark:bg-pink-900 dark:opacity-30"></div>

  <nav class="fixed top-0 left-0 right-0 z-50 glass-effect py-3 px-4 md:px-8">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div class="text-2xl font-semibold tracking-tight rounded-bold-title">
        <span class="text-apple-blue">Cyber</span>kingfisher
      </div>
      
      <div class="flex items-center space-x-4">
        <div class="hidden md:flex space-x-8 text-sm text-apple-darkgray dark:text-gray-300">
          <a href="#" class="hover:text-apple-blue transition-colors duration-300">Home</a>
          <a href="#" class="hover:text-apple-blue transition-colors duration-300">Gallery</a>
          <a href="#" class="hover:text-apple-blue transition-colors duration-300">About</a>
          <a href="#" class="hover:text-apple-blue transition-colors duration-300">Contact</a>
        </div>
        
        <div class="relative inline-block w-12 h-6 align-middle select-none transition duration-200 ease-in">
          <input type="checkbox" id="toggle-theme" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer">
          <label for="toggle-theme" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer dark:bg-gray-600"></label>
        </div>
        
        <div class="md:hidden">
          <button class="text-apple-darkgray hover:text-apple-blue transition-colors duration-300 dark:text-gray-300">
            <i class="fa fa-bars text-xl"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto pt-32 px-4 md:px-8 pb-20">
    <!-- 搜索区域 -->
    <section class="mb-16">
      <div class="max-w-3xl mx-auto glass-effect rounded-3xl p-6">
        <div class="relative">
          <input 
            type="text" 
            id="search-input"
            placeholder="搜索图片文件名..." 
            class="w-full px-6 py-4 rounded-full bg-white/50 dark:bg-gray-800/50 border-0 focus:ring-2 focus:ring-apple-blue dark:focus:ring-apple-blue outline-none transition-all duration-300"
          >
          <button 
            id="search-btn"
            class="absolute right-3 top-1/2 transform -translate-y-1/2 bg-apple-blue text-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-blue-600 transition-colors duration-300"
          >
            <i class="fa fa-search"></i>
          </button>
        </div>
        <p id="search-result" class="mt-4 text-sm text-apple-darkgray dark:text-gray-400 text-center hidden"></p>
      </div>
    </section>

    <!-- 图片画廊区域 -->
    <section class="mb-24">
      <div class="text-center mb-12">
        <h2 class="text-3xl md:text-4xl font-light mb-4 rounded-bold-title">图片素材画廊</h2>
        <p class="text-apple-darkgray dark:text-gray-400 max-w-2xl mx-auto">浏览 image 目录下的所有图片素材，点击图片可查看大图</p>
      </div>

      <!-- 图片容器 -->
      <div id="image-gallery" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- 图片会通过JS动态加载 -->
        <div class="col-span-full text-center text-apple-darkgray dark:text-gray-400 py-12">
          加载中...
        </div>
      </div>
    </section>

    <!-- 查看大图模态框 -->
    <div id="image-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 hidden">
      <button id="close-modal" class="absolute top-8 right-24 text-white text-3xl hover:text-apple-blue transition-colors duration-300">
        <i class="fa fa-times"></i>
      </button>
      <!-- 下载按钮 -->
      <button id="download-btn" class="absolute top-8 right-8 text-white text-3xl hover:text-apple-blue transition-colors duration-300" title="下载图片">
        <i class="fa fa-download"></i>
      </button>
      <div class="max-w-5xl max-h-[90vh] glass-effect rounded-3xl p-4">
        <img id="modal-image" src="" alt="大图预览" class="max-w-full max-h-[80vh] object-contain rounded-2xl">
        <p id="modal-filename" class="mt-4 text-center text-white text-lg"></p>
      </div>
    </div>
  </main>

  <footer class="glass-effect py-12 px-4 md:px-8">
    <div class="max-w-7xl mx-auto">
      <div class="pt-8 border-t border-gray-200/50 text-sm text-apple-darkgray dark:text-gray-400 flex flex-col md:flex-row justify-between items-center">
        <p>© 2026 Cyberkingfisher. All rights reserved.</p>
        <div class="flex space-x-6 mt-4 md:mt-0">
          <a href="#" class="hover:text-apple-blue transition-colors duration-300">Privacy Policy</a>
          <a href="#" class="hover:text-apple-blue transition-colors duration-300">Terms of Service</a>
          <a href="#" class="hover:text-apple-blue transition-colors duration-300">Cookies</a>
        </div>
      </div>
    </div>
  </footer>

  <style>
    @keyframes blob {
      0% {
        transform: translate(0px, 0px) scale(1);
      }
      33% {
        transform: translate(30px, -50px) scale(1.1);
      }
      66% {
        transform: translate(-20px, 20px) scale(0.9);
      }
      100% {
        transform: translate(0px, 0px) scale(1);
      }
    }
    .animate-blob {
      animation: blob 7s infinite;
    }
    .animation-delay-2000 {
      animation-delay: 2s;
    }
    .animation-delay-4000 {
      animation-delay: 4s;
    }

    html {
      scroll-behavior: smooth;
    }

    nav.scrolled {
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }
    .dark nav.scrolled {
      background: rgba(30, 30, 30, 0.9);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    /* 图片卡片样式 */
    .image-card {
      transition: all 0.3s ease;
    }
    .image-card:hover {
      transform: translateY(-5px);
    }
    .image-card img {
      aspect-ratio: 1/1;
      object-fit: cover;
    }
    
    /* 下载按钮样式优化 */
    #download-btn {
      z-index: 10;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #download-btn:hover {
      background: rgba(0, 113, 227, 0.8);
    }
  </style>

  <script>
    // 导航栏滚动效果
    window.addEventListener('scroll', function() {
      const nav = document.querySelector('nav');
      if (window.scrollY > 50) {
        nav.classList.add('scrolled');
      } else {
        nav.classList.remove('scrolled');
      }
    });

    // 深色模式切换
    document.addEventListener('DOMContentLoaded', function() {
      const html = document.documentElement;
      const themeToggle = document.getElementById('toggle-theme');
      
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        html.classList.add('dark');
        themeToggle.checked = true;
      } else {
        html.classList.remove('dark');
        themeToggle.checked = false;
      }
      
      themeToggle.addEventListener('change', function() {
        if (this.checked) {
          html.classList.add('dark');
          localStorage.theme = 'dark';
        } else {
          html.classList.remove('dark');
          localStorage.theme = 'light';
        }
      });

      // 图片画廊核心功能
      initImageGallery();
    });

    // 图片扩展名白名单
    const ALLOWED_EXTENSIONS = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp'];

    // 初始化图片画廊
    function initImageGallery() {
      const galleryContainer = document.getElementById('image-gallery');
      const searchInput = document.getElementById('search-input');
      const searchBtn = document.getElementById('search-btn');
      const searchResult = document.getElementById('search-result');
      const modal = document.getElementById('image-modal');
      const modalImage = document.getElementById('modal-image');
      const modalFilename = document.getElementById('modal-filename');
      const closeModal = document.getElementById('close-modal');
      const downloadBtn = document.getElementById('download-btn');
      
      // 存储当前选中的图片信息
      let currentImageUrl = '';
      let currentImageFilename = '';

      // 模拟获取image目录下的图片（实际部署时需要后端支持，这里先模拟示例）
      // 实际项目中，需要后端接口返回image目录下的文件列表
      const imageFiles = [
        // 示例图片 - 实际使用时替换为真实文件列表
        'IcanIlike.png',
        'code.png',
        '1.png',
        '2.png',
        '3.png',
        '4.png',
        'example1.jpg',
        'example2.webp',
        'example3.gif'
      ];

      // 渲染所有图片
      renderImages(imageFiles);

      // 搜索功能
      searchBtn.addEventListener('click', () => searchImages(imageFiles));
      searchInput.addEventListener('keyup', (e) => {
        if (e.key === 'Enter') searchImages(imageFiles);
      });

      // 关闭模态框
      closeModal.addEventListener('click', () => {
        modal.classList.add('hidden');
        document.body.style.overflow = 'auto';
      });

      // 点击模态框背景关闭
      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.classList.add('hidden');
          document.body.style.overflow = 'auto';
        }
      });

      // 下载图片功能
      downloadBtn.addEventListener('click', downloadImage);

      // 渲染图片函数
      function renderImages(images) {
        if (images.length === 0) {
          galleryContainer.innerHTML = `
            <div class="col-span-full text-center text-apple-darkgray dark:text-gray-400 py-12">
              未找到匹配的图片
            </div>
          `;
          return;
        }

        galleryContainer.innerHTML = '';
        images.forEach(filename => {
          // 过滤合法的图片扩展名
          const ext = filename.split('.').pop().toLowerCase();
          if (!ALLOWED_EXTENSIONS.includes(ext)) return;

          const card = document.createElement('div');
          card.className = 'image-card glass-effect rounded-3xl overflow-hidden hover-scale';
          card.innerHTML = `
            <img 
              src="image/${filename}" 
              alt="${filename}" 
              class="w-full h-auto object-cover"
              data-filename="${filename}"
              style="opacity: 0; transition: opacity 0.8s ease-in-out;"
            >
            <div class="p-4 text-center">
              <p class="text-apple-text dark:text-gray-100 font-medium">${filename}</p>
            </div>
          `;

          // 图片加载完成后显示
          const img = card.querySelector('img');
          img.onload = () => {
            img.style.opacity = '1';
          };
          if (img.complete) {
            img.style.opacity = '1';
          }

          // 点击图片打开模态框
          img.addEventListener('click', () => {
            // 保存当前图片信息
            currentImageUrl = img.src;
            currentImageFilename = filename;
            
            // 显示模态框
            modalImage.src = currentImageUrl;
            modalFilename.textContent = currentImageFilename;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
          });

          galleryContainer.appendChild(card);
        });
      }

      // 搜索图片函数
      function searchImages(images) {
        const keyword = searchInput.value.trim().toLowerCase();
        if (!keyword) {
          renderImages(images);
          searchResult.classList.add('hidden');
          return;
        }

        const filtered = images.filter(filename => 
          filename.toLowerCase().includes(keyword)
        );

        renderImages(filtered);
        
        // 显示搜索结果提示
        searchResult.textContent = `找到 ${filtered.length} 个匹配结果 (关键词: "${keyword}")`;
        searchResult.classList.remove('hidden');
      }

      // 下载图片函数
      function downloadImage() {
        if (!currentImageUrl || !currentImageFilename) return;
        
        // 创建临时链接
        const link = document.createElement('a');
        link.href = currentImageUrl;
        link.download = currentImageFilename;
        
        // 触发下载
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        // 下载反馈（可选）
        downloadBtn.classList.add('text-green-500');
        setTimeout(() => {
          downloadBtn.classList.remove('text-green-500');
        }, 1000);
      }
    }
  </script>
</body>
